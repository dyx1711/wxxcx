<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440, initial-scale=1.0, viewport-fit=cover">
  <title>工单详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1E90FF', page: '#F5F5F5' } } }
    }
  </script>
  <style>
    html, body { width: 440px; height: 956px; overflow: hidden; margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-page flex flex-col relative">

  <div class="h-[54px] bg-white flex items-end justify-between px-7 pb-1 shrink-0">
    <span class="text-[15px] font-semibold text-gray-900">9:41</span>
    <div class="w-[126px] h-[37px] bg-black rounded-full absolute left-1/2 -translate-x-1/2 top-[11px]"></div>
    <div class="flex items-center gap-1 text-gray-900">
      <svg class="w-[27px] h-[13px]" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="currentColor"/><rect x="2" y="2" width="17" height="9" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="h-11 bg-white flex items-center px-4 shrink-0 border-b border-gray-100 relative">
    <svg class="w-5 h-5 text-gray-700 absolute left-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
    <span class="text-[18px] font-semibold text-gray-900 flex-1 text-center">工单详情</span>
  </div>

  <div class="flex-1 overflow-y-auto scrollbar-hide pb-24">
    <!-- 工单状态头 -->
    <div class="bg-gradient-to-r from-red-500 to-orange-500 px-4 py-5 text-white">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-[11px] px-2 py-0.5 rounded-full bg-white/20 border border-white/30">维修工单</span>
        <span class="text-[11px] px-2 py-0.5 rounded-full bg-white/20 border border-white/30">紧急</span>
      </div>
      <h2 class="text-[18px] font-bold">空压机 A-001 故障维修</h2>
      <p class="text-[12px] opacity-80 mt-1">工单号：WO-20260530-0086</p>
    </div>

    <div class="px-4 -mt-3 space-y-3 pb-4">
      <!-- 进度 -->
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <h3 class="text-[14px] font-semibold text-gray-900 mb-4">处理进度</h3>
        <div class="flex items-start">
          <div class="flex flex-col items-center mr-3">
            <div class="w-3 h-3 rounded-full bg-primary"></div>
            <div class="w-0.5 h-8 bg-primary"></div>
            <div class="w-3 h-3 rounded-full bg-primary"></div>
            <div class="w-0.5 h-8 bg-gray-200"></div>
            <div class="w-3 h-3 rounded-full bg-gray-200"></div>
          </div>
          <div class="flex-1 space-y-5">
            <div>
              <p class="text-[14px] font-medium text-gray-900">工单创建</p>
              <p class="text-[12px] text-gray-400">2026-05-30 08:35 · 系统自动</p>
            </div>
            <div>
              <p class="text-[14px] font-medium text-gray-900">已派单</p>
              <p class="text-[12px] text-gray-400">2026-05-30 08:40 · 指派给张明</p>
            </div>
            <div>
              <p class="text-[14px] font-medium text-gray-400">处理中</p>
              <p class="text-[12px] text-gray-300">待工程师到场处理</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 工单信息 -->
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <h3 class="text-[14px] font-semibold text-gray-900 mb-3">工单信息</h3>
        <div class="space-y-3">
          <div class="flex justify-between"><span class="text-[12px] text-gray-500">关联设备</span><span class="text-[14px] text-primary">空压机 A-001</span></div>
          <div class="flex justify-between"><span class="text-[12px] text-gray-500">故障类型</span><span class="text-[14px] text-gray-900">排气温度过高</span></div>
          <div class="flex justify-between"><span class="text-[12px] text-gray-500">设备位置</span><span class="text-[14px] text-gray-900">车间A · 1区</span></div>
          <div class="flex justify-between"><span class="text-[12px] text-gray-500">截止时间</span><span class="text-[14px] text-red-500 font-medium">今天 18:00</span></div>
          <div class="flex justify-between"><span class="text-[12px] text-gray-500">处理人</span><span class="text-[14px] text-gray-900">张明</span></div>
        </div>
      </div>

      <!-- 故障描述 -->
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <h3 class="text-[14px] font-semibold text-gray-900 mb-2">故障描述</h3>
        <p class="text-[14px] text-gray-600 leading-relaxed">设备运行中排气温度持续升高，当前读数 98°C，已超过安全阈值 95°C。系统自动触发告警并生成维修工单，需尽快检查冷却系统和润滑油状态。</p>
      </div>

      <!-- 附件 -->
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <h3 class="text-[14px] font-semibold text-gray-900 mb-3">现场照片</h3>
        <div class="grid grid-cols-3 gap-2">
          <div class="aspect-square rounded-lg bg-gray-100 flex items-center justify-center">
            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
          </div>
          <div class="aspect-square rounded-lg bg-gray-100 flex items-center justify-center">
            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部操作 -->
  <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 pt-3 pb-[34px] flex gap-3">
    <button class="flex-1 border border-primary text-primary text-[14px] font-medium py-3 rounded-xl active:bg-blue-50">转派工单</button>
    <button class="flex-1 bg-primary text-white text-[14px] font-medium py-3 rounded-xl shadow-lg shadow-primary/30 active:opacity-90">开始处理</button>
  </div>
</body>
</html>
